# Model configuration

# Input settings
input:
  state_dim: 81  # 16 balls×4 features (xyz+pocketed) + 2 table size + 15 target flags
  action_dim: 5  # V0, phi, theta, a, b
  history_length: 3

# Network settings
network:
  type: "resnet"
  num_res_blocks: 3
  filters: 64
  kernel_size: 3
  batch_norm: true

# Output settings
output:
  policy_output_dim: 5  # V0, phi, theta, a, b
  value_output_dim: 1
  policy_activation: "tanh"
  value_activation: "tanh"

# Training settings
training:
  policy_loss_weight: 1.0
  value_loss_weight: 0.5
  entropy_loss_weight: 0.01