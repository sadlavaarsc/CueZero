# MCTS configuration

# Search settings
search:
  num_simulations: 1000
  exploration_weight: 0.25
  temperature: 1.0
  dirichlet_alpha: 0.3

# Action space settings
action:
  num_action_samples: 10
  action_noise: 0.1
  max_depth: 100

# Tree settings
tree:
  virtual_loss: 1.0
  reuse_tree: true
  discount_factor: 0.99